name: Caffedelli Auto-Poster

on:
  schedule:
    # A cada 1 hora (economia de minutos do GitHub Actions Free)
    # Tolerancia de 4h no scheduler garante que posts saem no dia agendado
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (nao publica de verdade)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poster
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_LOCATION_ID: ${{ secrets.IG_LOCATION_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/post_to_instagram.py

      - name: Commit schedule updates
        run: |
          git config user.name "caffedelli-bot"
          git config user.email "caffedelli-bot@users.noreply.github.com"
          git add schedule.json
          if ! git diff --cached --quiet; then
            git commit -m "auto: schedule update $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Rebase antes de push para evitar colisao com outros runs
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          else
            echo "Sem mudancas no schedule"
          fi
